{% extends 'base.html' %}
{% load static %}

{% block title %}비밀번호 변경 - 인컴 CRM{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row">
        <div class="col-12">
            <h2 class="mb-4">
                <i class="bi bi-key"></i> 비밀번호 변경
            </h2>
            
            <div class="card">
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label for="old_password" class="form-label">현재 비밀번호</label>
                            <input type="password" class="form-control" id="old_password" name="old_password" required>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password1" class="form-label">새 비밀번호</label>
                            <input type="password" class="form-control" id="new_password1" name="new_password1" required minlength="4">
                            <div class="form-text">비밀번호는 최소 4자 이상이어야 합니다.</div>
                        </div>
                        
                        <div class="mb-3">
                            <label for="new_password2" class="form-label">새 비밀번호 확인</label>
                            <input type="password" class="form-control" id="new_password2" name="new_password2" required minlength="4">
                        </div>
                        
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-circle"></i> 비밀번호 변경
                            </button>
                            <a href="{% url 'dashboard' %}" class="btn btn-secondary">
                                <i class="bi bi-x-circle"></i> 취소
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    // 비밀번호 일치 확인
    document.addEventListener('DOMContentLoaded', function() {
        const newPassword1 = document.getElementById('new_password1');
        const newPassword2 = document.getElementById('new_password2');
        
        function checkPasswordMatch() {
            if (newPassword2.value && newPassword1.value !== newPassword2.value) {
                newPassword2.setCustomValidity('비밀번호가 일치하지 않습니다.');
            } else {
                newPassword2.setCustomValidity('');
            }
        }
        
        newPassword1.addEventListener('input', checkPasswordMatch);
        newPassword2.addEventListener('input', checkPasswordMatch);
    });
</script>
{% endblock %}
