{% extends 'base.html' %}

{% block title %}팀원 삭제 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-trash"></i> 팀원 삭제</h2>
    <a href="{% url 'team_member_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <div class="alert alert-warning">
            <strong>정말 삭제하시겠습니까?</strong><br>
            이 작업은 되돌릴 수 없습니다.
        </div>
        
        <div class="mb-3">
            <strong>이름:</strong> {{ member.name }}<br>
            <strong>팀:</strong> {{ member.team.name|default:"-" }}
        </div>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end">
                <a href="{% url 'team_member_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-danger">삭제</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
