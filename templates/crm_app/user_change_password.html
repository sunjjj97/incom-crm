{% extends 'base.html' %}

{% block title %}비밀번호 변경 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-key"></i> 사용자 비밀번호 변경</h2>
    <a href="{% url 'user_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <div class="alert alert-info mb-4">
            <strong>사용자:</strong> {{ user.username }}<br>
            <strong>이름:</strong> {{ user.get_full_name|default:"-" }}
        </div>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="mb-3">
                <label for="new_password1" class="form-label">새 비밀번호 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="new_password1" name="new_password1" required minlength="4">
                <div class="form-text">비밀번호는 최소 4자 이상이어야 합니다. 초기 비밀번호는 <strong>1234</strong>를 권장합니다.</div>
            </div>
            
            <div class="mb-3">
                <label for="new_password2" class="form-label">새 비밀번호 확인 <span class="text-danger">*</span></label>
                <input type="password" class="form-control" id="new_password2" name="new_password2" required minlength="4">
            </div>
            
            <div class="d-flex justify-content-end">
                <a href="{% url 'user_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-primary">비밀번호 변경</button>
            </div>
        </form>
    </div>
</div>

<script>
    // 비밀번호 일치 확인
    document.addEventListener('DOMContentLoaded', function() {
        const newPassword1 = document.getElementById('new_password1');
        const newPassword2 = document.getElementById('new_password2');
        
        function checkPasswordMatch() {
            if (newPassword2.value && newPassword1.value !== newPassword2.value) {
                newPassword2.setCustomValidity('비밀번호가 일치하지 않습니다.');
            } else {
                newPassword2.setCustomValidity('');
            }
        }
        
        newPassword1.addEventListener('input', checkPasswordMatch);
        newPassword2.addEventListener('input', checkPasswordMatch);
    });
</script>
{% endblock %}
