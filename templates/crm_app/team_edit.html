{% extends 'base.html' %}

{% block title %}팀 수정 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil"></i> 팀 수정</h2>
    <a href="{% url 'team_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">팀명 <span class="text-danger">*</span></label>
                <input type="text" class="form-control" name="name" value="{{ team.name }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">사업부</label>
                <select class="form-select" name="department">
                    <option value="">선택 안함</option>
                    {% for dept in departments %}
                        <option value="{{ dept.id }}" {% if team.department.id == dept.id %}selected{% endif %}>{{ dept.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'team_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-primary">수정</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
