{% extends 'base.html' %}
{% load humanize %}

{% block title %}매출 수정 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil"></i> 매출 수정</h2>
    <a href="{% url 'sales_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">업체명 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="company_name" value="{{ sale.company_name }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">대표자명</label>
                    <input type="text" class="form-control" name="representative" value="{{ sale.representative|default:'' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">전화번호</label>
                    <input type="text" class="form-control" name="phone" value="{{ sale.phone|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">결제금액 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="payment_amount" id="payment_amount" value="{{ sale.payment_amount|floatformat:0|intcomma }}" placeholder="예: 1,000,000" required>
                    <small class="text-muted">천단위 구분 기호(쉼표)를 사용할 수 있습니다.</small>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <label class="form-label">계약일 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" name="contract_date" value="{{ sale.contract_date|date:'Y-m-d' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">계약만료일 <span class="text-danger">*</span></label>
                    <input type="date" class="form-control" name="contract_expiry" value="{{ sale.contract_expiry|date:'Y-m-d' }}" required>
                </div>
                <div class="col-md-4">
                    <label class="form-label">담당 팀</label>
                    <select class="form-select" name="team" id="team_select" onchange="loadTeamMembers(this.value)">
                        <option value="">선택 안함</option>
                        {% for team in teams %}
                            <option value="{{ team.id }}" {% if sale.team.id == team.id %}selected{% endif %}>{{ team.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">계약 유형</label>
                    <select class="form-select" name="contract_type" id="contract_type" onchange="togglePreviousContract(this.value)">
                        <option value="new" {% if sale.contract_type == 'new' %}selected{% endif %}>신규 계약</option>
                        <option value="renewal" {% if sale.contract_type == 'renewal' %}selected{% endif %}>재계약</option>
                        <option value="additional" {% if sale.contract_type == 'additional' %}selected{% endif %}>추가 계약</option>
                    </select>
                </div>
                <div class="col-md-6" id="previous_contract_div" style="display: {% if sale.contract_type == 'renewal' or sale.contract_type == 'additional' %}block{% else %}none{% endif %};">
                    <label class="form-label">이전 계약</label>
                    <select class="form-select" name="previous_contract">
                        <option value="">선택 안함</option>
                        {% for company in companies %}
                            <option value="{{ company.id }}" 
                                    {% if sale.previous_contract.id == company.id %}selected{% endif %}>
                                {{ company.company_name }} ({{ company.contract_date|date:"Y-m-d" }})
                            </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">재계약 또는 추가 계약인 경우 이전 계약을 선택하세요.</small>
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">담당 팀원</label>
                    <select class="form-select" name="team_member" id="team_member_select">
                        <option value="">먼저 담당 팀을 선택하세요</option>
                        {% for member in members %}
                            <option value="{{ member.id }}" 
                                    data-team-id="{{ member.team.id|default:'' }}"
                                    {% if sale.team_member.id == member.id %}selected{% endif %}>
                                {{ member.name }}
                            </option>
                        {% endfor %}
                    </select>
                    <small class="text-muted">담당 팀을 선택하면 해당 팀의 팀원만 표시됩니다.</small>
                </div>
            </div>
            <div class="mb-3">
                <label class="form-label">비고</label>
                <textarea class="form-control" name="notes" rows="3">{{ sale.notes|default:"" }}</textarea>
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'sales_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-primary">수정</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    // 결제금액 입력 시 천단위 구분 기호 추가
    document.getElementById('payment_amount').addEventListener('input', function(e) {
        let value = e.target.value.replace(/,/g, ''); // 쉼표 제거
        if (value && !isNaN(value)) {
            value = parseInt(value).toLocaleString('ko-KR');
            e.target.value = value;
        }
    });

    // 폼 제출 전 쉼표 제거
    document.querySelector('form').addEventListener('submit', function(e) {
        const paymentInput = document.getElementById('payment_amount');
        if (paymentInput.value) {
            paymentInput.value = paymentInput.value.replace(/,/g, '');
        }
    });
    
    // 계약 유형에 따라 이전 계약 선택 필드 표시/숨김
    function togglePreviousContract(contractType) {
        const div = document.getElementById('previous_contract_div');
        if (contractType === 'renewal' || contractType === 'additional') {
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    }
    
    // 팀 선택 시 해당 팀의 팀원 목록 로드
    function loadTeamMembers(teamId) {
        const teamMemberSelect = document.getElementById('team_member_select');
        const currentSelectedValue = teamMemberSelect.value; // 현재 선택된 값 저장
        
        if (!teamId) {
            // 팀이 선택되지 않으면 모든 팀원 표시
            teamMemberSelect.innerHTML = '<option value="">선택 안함</option>';
            {% for member in members %}
            const option = document.createElement('option');
            option.value = '{{ member.id }}';
            option.textContent = '{{ member.name }}';
            {% if sale.team_member and sale.team_member.id == member.id %}option.selected = true;{% endif %}
            teamMemberSelect.appendChild(option);
            {% endfor %}
            return;
        }
        
        // AJAX로 팀원 목록 가져오기
        fetch(`{% url 'get_team_members' %}?team_id=${teamId}`)
            .then(response => response.json())
            .then(data => {
                teamMemberSelect.innerHTML = '<option value="">선택 안함</option>';
                
                if (data.members && data.members.length > 0) {
                    data.members.forEach(member => {
                        const option = document.createElement('option');
                        option.value = member.id;
                        option.textContent = member.name;
                        // 현재 선택된 팀원이면 선택 상태 유지
                        if (currentSelectedValue == member.id) {
                            option.selected = true;
                        }
                        teamMemberSelect.appendChild(option);
                    });
                } else {
                    const option = document.createElement('option');
                    option.value = '';
                    option.textContent = '해당 팀에 등록된 팀원이 없습니다';
                    teamMemberSelect.appendChild(option);
                }
            })
            .catch(error => {
                console.error('팀원 목록을 불러오는 중 오류 발생:', error);
                teamMemberSelect.innerHTML = '<option value="">오류가 발생했습니다</option>';
            });
    }
    
    // 페이지 로드 시 현재 선택된 팀이 있으면 해당 팀의 팀원만 표시
    document.addEventListener('DOMContentLoaded', function() {
        const teamSelect = document.getElementById('team_select');
        if (teamSelect.value) {
            loadTeamMembers(teamSelect.value);
        }
    });
</script>
{% endblock %}
