{% extends 'base.html' %}

{% block title %}사용자 수정 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-pencil"></i> 사용자 수정</h2>
    <a href="{% url 'user_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">아이디 <span class="text-danger">*</span></label>
                    <input type="text" class="form-control" name="username" value="{{ user.username }}" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label">이메일</label>
                    <input type="email" class="form-control" name="email" value="{{ user.email|default:'' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-6">
                    <label class="form-label">이름</label>
                    <input type="text" class="form-control" name="first_name" value="{{ user.first_name|default:'' }}">
                </div>
                <div class="col-md-6">
                    <label class="form-label">성</label>
                    <input type="text" class="form-control" name="last_name" value="{{ user.last_name|default:'' }}">
                </div>
            </div>
            <div class="row mb-3">
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_staff" id="is_staff" {% if user.is_staff %}checked{% endif %}>
                        <label class="form-check-label" for="is_staff">
                            관리자 권한
                        </label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_superuser" id="is_superuser" {% if user.is_superuser %}checked{% endif %}>
                        <label class="form-check-label" for="is_superuser">
                            슈퍼유저 권한
                        </label>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" name="is_active" id="is_active" {% if user.is_active %}checked{% endif %}>
                        <label class="form-check-label" for="is_active">
                            활성화
                        </label>
                    </div>
                </div>
            </div>
            <div class="alert alert-info">
                <strong>💡 비밀번호 변경:</strong> 비밀번호를 변경하려면 <a href="{% url 'user_change_password' user.pk %}" class="alert-link">여기를 클릭</a>하세요.
            </div>
            <div class="d-flex justify-content-end">
                <a href="{% url 'user_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-primary">수정</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
