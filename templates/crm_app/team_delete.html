{% extends 'base.html' %}

{% block title %}팀 삭제 - 인컴 CRM{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2><i class="bi bi-trash"></i> 팀 삭제</h2>
    <a href="{% url 'team_list' %}" class="btn btn-secondary">
        <i class="bi bi-arrow-left"></i> 목록으로
    </a>
</div>

<div class="card">
    <div class="card-body">
        <p class="alert alert-warning">정말로 <strong>{{ team.name }}</strong> 팀을 삭제하시겠습니까?</p>
        <p class="text-muted">이 작업은 되돌릴 수 없습니다.</p>
        
        <form method="post">
            {% csrf_token %}
            <div class="d-flex justify-content-end">
                <a href="{% url 'team_list' %}" class="btn btn-secondary me-2">취소</a>
                <button type="submit" class="btn btn-danger">삭제</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
